appId: com.jizhi.gz4399
productName: 极智
copyright: Copyright © 2026 极智团队
compression: normal
artifactName: jizhi-${version}-${os}-${arch}.${ext}

protocols:
  - name: jizhi-oauth
    schemes:
      - jizhi

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron
  - package.json

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
      - "!icons/*.md"
      - "!icons/*.svg"
      - "!bin/**"
      - "!screenshot/**"

asar: true
asarUnpack:
  - "**/*.node"

npmRebuild: false

# Auto-update configuration — GitHub Releases
# electron-updater queries the GitHub API to find the latest release asset
# matching the installed channel (beta-mac.yml, latest-mac.yml, etc.)
publish:
  - provider: github
    owner: Emma-Alpha
    repo: MimiClaw
    releaseType: release

# macOS Configuration
mac:
  extraResources:
    - from: resources/bin/darwin-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
  identity: "-"
  # Explicitly set code requirements to bundle identifier only.
  # Ad-hoc signing (identity: "-") by default embeds a cdhash-based requirement
  # that changes with every build, causing ShipIt (Squirrel.Mac) to fail
  # signature validation when installing updates. Setting this to only check
  # the bundle identifier makes the requirement stable across versions.
  requirements: resources/mac-requirements.txt
  extendInfo:
    NSMicrophoneUsageDescription: 极智需要麦克风权限以支持语音功能
    NSCameraUsageDescription: 极智需要摄像头权限以支持视频功能

dmg:
  background: resources/dmg-background.png
  icon: resources/icons/icon.icns
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - type: file
      x: 130
      y: 220
    - type: link
      path: /Applications
      x: 410
      y: 220

# Windows Configuration
win:
  # Skip update signature verification: we ship via OSS + GitHub without a
  # code-signing certificate, so verifying would always fail on the updater.
  verifyUpdateCodeSignature: false
  extraResources:
    - from: resources/bin/win32-${arch}
      to: bin
    - from: resources/cli/win32/
      to: cli/
  icon: resources/icons/icon.ico
  target:
    - target: nsis
      arch: x64
    - target: nsis
      arch: arm64

nsis:
  oneClick: false
  perMachine: false
  warningsAsErrors: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  differentialPackage: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 极智
  uninstallDisplayName: 极智
  license: LICENSE
  include: scripts/installer.nsh
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

# Linux Configuration
linux:
  extraResources:
    - from: resources/bin/linux-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  icon: resources/icons
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  category: Utility
  maintainer: 极智团队 <1733452028@qq.com>
  vendor: 极智
  synopsis: AI 智能助手
  description: 极智是一款图形化 AI 助手应用，集成 OpenClaw 网关，提供跨多平台的智能自动化与辅助功能。
  desktop:
    entry:
      Name: 极智
      Comment: AI 智能助手
      Categories: Utility;Network;
      Keywords: ai;assistant;automation;chat;
      StartupWMClass: jizhi

appImage:
  license: LICENSE

deb:
  depends:
    # Use OR syntax to support both Ubuntu 22.04 and Ubuntu 24.04 (t64 transition).
    # Ubuntu 24.04 renamed many libraries with a t64 suffix (64-bit time_t ABI transition).
    - libgtk-3-0 | libgtk-3-0t64
    - libnotify4 | libnotify4t64
    - libnss3
    - libxss1 | libxss1t64
    - libxtst6 | libxtst6t64
    - xdg-utils
    - libatspi2.0-0 | libatspi2.0-0t64
    - libuuid1
  afterInstall: scripts/linux/after-install.sh
  afterRemove: scripts/linux/after-remove.sh
