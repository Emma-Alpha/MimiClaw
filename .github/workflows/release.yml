# ClawX Release Workflow
# macOS-only release pipeline.
#
# Topology:
#   cos-clean ───────────────────────────────────────────────┐
#   build-mac → cos-upload-mac (needs: cos-clean + build-mac)│→ finalize

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

# ─────────────────────────────────────────────────────────────────────────────
# Reusable setup steps for the macOS release pipeline
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────────────────────
  # Pre-job: clear the COS channel directory before macOS upload.
  # ──────────────────────────────────────────────────────────────
  cos-clean:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Extract channel
        id: ch
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            echo "channel=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "channel=latest" >> $GITHUB_OUTPUT
          fi

      - name: Install coscli
        run: |
          wget -q "https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux" -O /tmp/coscli
          chmod +x /tmp/coscli
          sudo mv /tmp/coscli /usr/local/bin/coscli

      - name: Configure coscli
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          cat > ~/.cos.yaml << EOF
          cos:
            base:
              secretid: "${COS_SECRET_ID}"
              secretkey: "${COS_SECRET_KEY}"
              sessiontoken: ""
              protocol: https
            buckets:
              - name: "cobot-1254397474"
                region: "ap-guangzhou"
                endpoint: "cos.ap-guangzhou.myqcloud.com"
                alias: "cobot-1254397474"
          EOF

      - name: Clear COS channel directory
        run: |
          CHANNEL="${{ steps.ch.outputs.channel }}"
          coscli rm -r cos://cobot-1254397474/${CHANNEL}/ -f || true
          echo "Cleared ${CHANNEL}/"

  # ──────────────────────────────────────────────────────────────
  # macOS pipeline: build → publish to GitHub Release → upload COS
  # ──────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Cache Vite build output
        id: cache-vite
        uses: actions/cache@v4
        with:
          path: |
            dist
            dist-electron
          key: ${{ runner.os }}-vite-${{ hashFiles('src/**', 'electron/**', 'shared/**', 'vite.config.*', 'tsconfig*.json', 'pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-vite-

      - uses: actions/cache@v4
        with:
          path: |
            build/openclaw
            build/openclaw-plugins
            build/preinstalled-skills
          key: ${{ runner.os }}-build-bundles-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-build-bundles-

      - run: pnpm install --frozen-lockfile
      - run: pnpm run uv:download:mac

      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_PARALLELISM: 4
          SKIP_VITE_BUILD: ${{ steps.cache-vite.outputs.cache-hit == 'true' && 'true' || 'false' }}
        run: |
          ulimit -n 65536
          pnpm run package:mac:ci

      - name: Remove builder-debug.yml
        run: find release/ -name "builder-debug.yml" -delete || true

      - name: Publish macOS to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: true
          body: |
            ## 🚀 极智 ${{ github.ref_name }}

            极智 - AI 智能助手

            ### 📦 下载

            请下载 macOS 对应安装包：

            #### macOS
            - **Apple Silicon (M1/M2/M3/M4)**: `jizhi-*-mac-arm64.dmg`
            - **Intel (x64)**: `jizhi-*-mac-x64.dmg`

            ### 📝 更新说明

            详见下方自动生成的更新日志。

            ### ⚠️ 安装注意事项

            - **macOS**：首次启动可能提示"来自未知开发者"，请前往系统设置 → 隐私与安全性，点击"仍要打开"；若提示"已损坏"，请在终端执行 `xattr -cr /Applications/极智.app` 后重新打开

            ---

            💬 遇到问题？请提交 [Issue](https://github.com/${{ github.repository }}/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
          retention-days: 7

  cos-upload-mac:
    needs: [cos-clean, build-mac]
    runs-on: [self-hosted, linux, cos-upload]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Extract version and channel
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then CHANNEL="${BASH_REMATCH[1]}"; else CHANNEL="latest"; fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: artifacts

      - name: Install & configure coscli
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          command -v coscli || (
            wget -q "https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux" -O /tmp/coscli
            chmod +x /tmp/coscli && sudo mv /tmp/coscli /usr/local/bin/coscli
          )
          cat > ~/.cos.yaml << EOF
          cos:
            base:
              secretid: "${COS_SECRET_ID}"
              secretkey: "${COS_SECRET_KEY}"
              sessiontoken: ""
              protocol: https
            buckets:
              - name: "cobot-1254397474"
                region: "ap-guangzhou"
                endpoint: "cos.ap-guangzhou.myqcloud.com"
                alias: "cobot-1254397474"
          EOF

      - name: Upload macOS to COS
        run: |
          CHANNEL="${{ steps.ver.outputs.channel }}"
          TAG="${{ steps.ver.outputs.tag }}"
          PARALLEL=2
          pids=()
          for f in artifacts/*; do
            fname=$(basename "$f")
            (
              # Upload once to releases/${TAG}/ then server-side copy to ${CHANNEL}/
              coscli cp "$f" "cos://cobot-1254397474/releases/${TAG}/${fname}" \
                --meta "Cache-Control:public,max-age=31536000,immutable" --thread-num 4
              coscli cp "cos://cobot-1254397474/releases/${TAG}/${fname}" \
                "cos://cobot-1254397474/${CHANNEL}/${fname}" \
                --meta "Cache-Control:no-store,must-revalidate"
            ) &
            pids+=($!)
            if (( ${#pids[@]} >= PARALLEL )); then
              wait "${pids[0]}" || exit 1
              pids=("${pids[@]:1}")
            fi
          done
          for pid in "${pids[@]}"; do wait "$pid" || exit 1; done
          echo "macOS artifacts uploaded to ${CHANNEL}/ and releases/${TAG}/"

  # ──────────────────────────────────────────────────────────────
  # Finalize: generate release-info.json, upload to COS, promote release
  # Runs after macOS upload completes.
  # ──────────────────────────────────────────────────────────────
  finalize:
    needs: [cos-upload-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Extract version and channel
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then CHANNEL="${BASH_REMATCH[1]}"; else CHANNEL="latest"; fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}, channel: ${CHANNEL}"

      - name: Install & configure coscli
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          wget -q "https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux" -O /tmp/coscli
          chmod +x /tmp/coscli && sudo mv /tmp/coscli /usr/local/bin/coscli
          cat > ~/.cos.yaml << EOF
          cos:
            base:
              secretid: "${COS_SECRET_ID}"
              secretkey: "${COS_SECRET_KEY}"
              sessiontoken: ""
              protocol: https
            buckets:
              - name: "cobot-1254397474"
                region: "ap-guangzhou"
                endpoint: "cos.ap-guangzhou.myqcloud.com"
                alias: "cobot-1254397474"
          EOF

      - name: Generate and upload release-info.json
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          CHANNEL="${{ steps.ver.outputs.channel }}"
          TAG="${{ steps.ver.outputs.tag }}"
          BASE_URL="https://cobot-1254397474.cos.ap-guangzhou.myqcloud.com/${CHANNEL}"

          jq -n \
            --arg version "$VERSION" \
            --arg channel "$CHANNEL" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg base "$BASE_URL" \
            --arg changelog "https://github.com/${{ github.repository }}/releases/tag/${TAG}" \
            '{
              version: $version,
              channel: $channel,
              releaseDate: $date,
              downloads: {
                mac: {
                  x64: ($base + "/jizhi-" + $version + "-mac-x64.dmg"),
                  arm64: ($base + "/jizhi-" + $version + "-mac-arm64.dmg")
                },
                win: {
                  x64: ($base + "/jizhi-" + $version + "-win-x64.exe"),
                  arm64: ($base + "/jizhi-" + $version + "-win-arm64.exe")
                },
                linux: {
                  deb_amd64: ($base + "/jizhi-" + $version + "-linux-amd64.deb"),
                  deb_arm64: ($base + "/jizhi-" + $version + "-linux-arm64.deb"),
                  appimage_x64: ($base + "/jizhi-" + $version + "-linux-x86_64.AppImage"),
                  appimage_arm64: ($base + "/jizhi-" + $version + "-linux-arm64.AppImage"),
                  rpm_x64: ($base + "/jizhi-" + $version + "-linux-x86_64.rpm")
                }
              },
              changelog: $changelog
            }' > release-info.json

          echo "=== release-info.json ===" && cat release-info.json

          coscli cp release-info.json "cos://cobot-1254397474/${CHANNEL}/release-info.json" \
            --meta "Cache-Control:no-store,must-revalidate"
          coscli cp release-info.json "cos://cobot-1254397474/releases/${TAG}/release-info.json" \
            --meta "Cache-Control:public,max-age=31536000,immutable"

      - name: Verify COS upload
        run: |
          CHANNEL="${{ steps.ver.outputs.channel }}"
          TAG="${{ steps.ver.outputs.tag }}"
          echo "=== ${CHANNEL}/ ===" && coscli ls cos://cobot-1254397474/${CHANNEL}/
          echo "" && echo "=== releases/${TAG}/ ===" && coscli ls cos://cobot-1254397474/releases/${TAG}/
          echo "" && echo "All files verified successfully!"

      - name: Promote GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]]; then
            echo "Tag $TAG is alpha/beta — keeping as pre-release."
          else
            echo "Promoting $TAG to latest release..."
            gh release edit "$TAG" --prerelease=false --latest --repo "${{ github.repository }}"
            echo "Done."
          fi
