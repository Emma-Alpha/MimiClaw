# ClawX Release Workflow
# Each platform builds and publishes to GitHub Release independently (no cross-platform wait).
# COS upload runs once after all platforms complete (needs all platform YML files).
#
# Pipeline topology:
#   release-mac   ──→ publish to GitHub Release ─┐
#   release-win   ──→ publish to GitHub Release  ─┼─→ upload-cos → finalize
#   release-linux ──→ publish to GitHub Release ─┘

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

# Cancel any in-progress run for the same ref (e.g. rapid tag re-push)
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job: Build + Publish (runs in parallel per platform)
  # Each platform builds and immediately publishes its artifacts to
  # GitHub Release — no waiting for other platforms.
  # ──────────────────────────────────────────────────────────────
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache Vite build output
        id: cache-vite
        uses: actions/cache@v4
        with:
          path: |
            dist
            dist-electron
          key: ${{ runner.os }}-vite-${{ hashFiles('src/**', 'electron/**', 'shared/**', 'vite.config.*', 'tsconfig*.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Cache build bundle outputs
        uses: actions/cache@v4
        with:
          path: |
            build/openclaw
            build/openclaw-plugins
            build/preinstalled-skills
          key: ${{ runner.os }}-build-bundles-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-bundles-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uv binaries for macOS
        if: matrix.platform == 'mac'
        run: pnpm run uv:download:mac

      - name: Download uv binaries for Windows
        if: matrix.platform == 'win'
        run: pnpm run uv:download:win

      - name: Download uv binaries for Linux
        if: matrix.platform == 'linux'
        run: pnpm run uv:download:linux

      - name: Build macOS
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CI_PARALLELISM: 4
          SKIP_VITE_BUILD: ${{ steps.cache-vite.outputs.cache-hit == 'true' && 'true' || 'false' }}
        run: |
          ulimit -n 65536
          pnpm run package:mac:ci

      - name: Build Windows
        if: matrix.platform == 'win'
        env:
          CI_PARALLELISM: 4
          SKIP_VITE_BUILD: ${{ steps.cache-vite.outputs.cache-hit == 'true' && 'true' || 'false' }}
        run: pnpm run package:win:ci

      - name: Build Linux
        if: matrix.platform == 'linux'
        env:
          CI_PARALLELISM: 4
          SKIP_VITE_BUILD: ${{ steps.cache-vite.outputs.cache-hit == 'true' && 'true' || 'false' }}
        run: pnpm run package:linux:ci

      # Remove builder-debug.yml before publishing
      - name: Remove builder-debug.yml
        shell: bash
        run: find release/ -name "builder-debug.yml" -delete || true

      # ── Publish: macOS ─────────────────────────────────────────
      # macOS sets the release body and generates release notes.
      # The other platforms just append their files.
      - name: Publish macOS artifacts to GitHub Release
        if: matrix.platform == 'mac' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: true
          body: |
            ## 🚀 极智 ${{ github.ref_name }}

            极智 - AI 智能助手

            ### 📦 下载

            请根据您的操作系统和架构选择对应的安装包：

            #### macOS
            - **Apple Silicon (M1/M2/M3/M4)**: `jizhi-*-mac-arm64.dmg`
            - **Intel (x64)**: `jizhi-*-mac-x64.dmg`

            #### Windows
            - **安装包 (x64)**: `jizhi-*-win-x64.exe`
            - **安装包 (ARM64)**: `jizhi-*-win-arm64.exe`

            #### Linux
            - **AppImage (x64)**: `jizhi-*-linux-x86_64.AppImage`（通用格式，推荐）
            - **AppImage (ARM64)**: `jizhi-*-linux-arm64.AppImage`
            - **Debian/Ubuntu (x64)**: `jizhi-*-linux-amd64.deb`
            - **Debian/Ubuntu (ARM64)**: `jizhi-*-linux-arm64.deb`
            - **RPM (x64)**: `jizhi-*-linux-x86_64.rpm`

            ### 📝 更新说明

            详见下方自动生成的更新日志。

            ### ⚠️ 安装注意事项

            - **macOS**：首次启动可能提示"无法验证开发者"，请前往系统偏好设置 → 安全性与隐私，允许运行
            - **Windows**：SmartScreen 可能拦截安装，点击"更多信息" → "仍要运行"
            - **Linux AppImage**：先运行 `chmod +x jizhi-*.AppImage` 添加执行权限；Ubuntu 22.04 需安装 `libfuse2`，Ubuntu 24.04 需安装 `libfuse2t64`
            - **Linux .deb (Ubuntu 24.04)**：如依赖缺失，先执行 `sudo apt install libgtk-3-0t64 libnotify4t64 libxss1t64`

            ---

            💬 遇到问题？请提交 [Issue](https://github.com/${{ github.repository }}/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Publish: Windows ───────────────────────────────────────
      - name: Publish Windows artifacts to GitHub Release
        if: matrix.platform == 'win' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Publish: Linux ─────────────────────────────────────────
      - name: Publish Linux artifacts to GitHub Release
        if: matrix.platform == 'linux' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload artifacts to shared storage (needed by upload-cos job)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job: Upload to Tencent COS
  # Waits for ALL platforms to finish so the channel directory
  # contains all electron-updater YML files (latest-mac.yml,
  # latest.yml, latest-linux.yml) before being published.
  # ──────────────────────────────────────────────────────────────
  upload-cos:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*

      - name: Extract version and channel
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            CHANNEL="${BASH_REMATCH[1]}"
          else
            CHANNEL="latest"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}, channel: ${CHANNEL}"

      - name: Prepare upload directories
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          CHANNEL="${{ steps.version.outputs.channel }}"

          mkdir -p staging/${CHANNEL}
          mkdir -p staging/releases/${TAG}

          find release-artifacts/ -type f | while read file; do
            filename=$(basename "$file")
            cp "$file" "staging/${CHANNEL}/${filename}"
            cp "$file" "staging/releases/${TAG}/${filename}"
          done

          echo "=== staging/${CHANNEL}/ ==="
          ls -lh staging/${CHANNEL}/
          echo ""
          echo "=== staging/releases/${TAG}/ ==="
          ls -lh staging/releases/${TAG}/

      - name: Verify yml files present
        run: |
          CHANNEL="${{ steps.version.outputs.channel }}"
          echo "=== staging/${CHANNEL}/ (update metadata) ==="
          ls -la staging/${CHANNEL}/*.yml 2>/dev/null || echo "No yml files found (check electron-builder outputs)"

      - name: Generate release-info.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          BASE_URL="https://cobot-1254397474.cos.ap-guangzhou.myqcloud.com/${CHANNEL}"

          jq -n \
            --arg version "$VERSION" \
            --arg channel "$CHANNEL" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg base "$BASE_URL" \
            --arg changelog "https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" \
            '{
              version: $version,
              channel: $channel,
              releaseDate: $date,
              downloads: {
                mac: {
                  x64: ($base + "/jizhi-" + $version + "-mac-x64.dmg"),
                  arm64: ($base + "/jizhi-" + $version + "-mac-arm64.dmg")
                },
                win: {
                  x64: ($base + "/jizhi-" + $version + "-win-x64.exe"),
                  arm64: ($base + "/jizhi-" + $version + "-win-arm64.exe")
                },
                linux: {
                  deb_amd64: ($base + "/jizhi-" + $version + "-linux-amd64.deb"),
                  deb_arm64: ($base + "/jizhi-" + $version + "-linux-arm64.deb"),
                  appimage_x64: ($base + "/jizhi-" + $version + "-linux-x86_64.AppImage"),
                  appimage_arm64: ($base + "/jizhi-" + $version + "-linux-arm64.AppImage"),
                  rpm_x64: ($base + "/jizhi-" + $version + "-linux-x86_64.rpm")
                }
              },
              changelog: $changelog
            }' > staging/${CHANNEL}/release-info.json

          echo "=== release-info.json ==="
          cat staging/${CHANNEL}/release-info.json

      - name: Install coscli
        run: |
          wget -q "https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux" -O /tmp/coscli
          chmod +x /tmp/coscli
          sudo mv /tmp/coscli /usr/local/bin/coscli
          coscli --version

      - name: Configure coscli
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          cat > ~/.cos.yaml << EOF
          cos:
            base:
              secretid: "${COS_SECRET_ID}"
              secretkey: "${COS_SECRET_KEY}"
              sessiontoken: ""
              protocol: https
            buckets:
              - name: "cobot-1254397474"
                region: "ap-guangzhou"
                endpoint: "cos.ap-guangzhou.myqcloud.com"
                alias: "cobot-1254397474"
          EOF

      - name: "Upload to COS: {channel}/ (overwrite)"
        run: |
          CHANNEL="${{ steps.version.outputs.channel }}"
          coscli rm -r cos://cobot-1254397474/${CHANNEL}/ -f || true
          coscli cp -r staging/${CHANNEL}/ cos://cobot-1254397474/${CHANNEL}/ \
            --meta "Cache-Control:no-store,must-revalidate"
          echo "Uploaded to ${CHANNEL}/"

      - name: "Upload to COS: releases/vX.Y.Z/ (archive)"
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          coscli cp -r staging/releases/${TAG}/ cos://cobot-1254397474/releases/${TAG}/ \
            --meta "Cache-Control:public,max-age=31536000,immutable"
          echo "Uploaded to releases/${TAG}/"

      - name: Verify COS upload
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          CHANNEL="${{ steps.version.outputs.channel }}"

          echo "=== ${CHANNEL}/ ==="
          coscli ls cos://cobot-1254397474/${CHANNEL}/

          echo ""
          echo "=== releases/${TAG}/ ==="
          coscli ls cos://cobot-1254397474/releases/${TAG}/

          echo ""
          echo "=== Verify release-info.json ==="
          coscli cp cos://cobot-1254397474/${CHANNEL}/release-info.json /tmp/release-info.json
          jq . /tmp/release-info.json

          echo ""
          echo "=== Verify update yml ==="
          if [ "${CHANNEL}" = "latest" ]; then
            YML_PREFIX="latest"
          else
            YML_PREFIX="${CHANNEL}"
          fi
          echo "electron-updater expects ${YML_PREFIX}-mac.yml, ${YML_PREFIX}.yml, etc. in ${CHANNEL}/:"
          coscli ls cos://cobot-1254397474/${CHANNEL}/ | grep "${YML_PREFIX}.*\\.yml" || echo "(none found)"

          echo ""
          echo "All files uploaded and verified successfully!"

  # ──────────────────────────────────────────────────────────────
  # Job: Finalize Release
  # ──────────────────────────────────────────────────────────────
  finalize:
    needs: upload-cos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Promote release from pre-release to latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          IS_PRERELEASE_CHANNEL=false

          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]]; then
            IS_PRERELEASE_CHANNEL=true
          fi

          if [ "$IS_PRERELEASE_CHANNEL" = "true" ]; then
            echo "Tag $TAG is an alpha/beta release — keeping as pre-release."
          else
            echo "Promoting $TAG from pre-release to latest release..."
            gh release edit "$TAG" \
              --prerelease=false \
              --latest \
              --repo "${{ github.repository }}"
            echo "Release $TAG is now the latest release."
          fi
