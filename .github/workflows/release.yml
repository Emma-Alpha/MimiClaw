# ClawX Release Workflow — GitHub Releases only
#
# Topology:
#   build-mac → publish to GitHub Release (tag push or manual trigger)
#
# Auto-update: electron-updater queries GitHub Releases API for
# the channel-specific yml asset (beta-mac.yml / latest-mac.yml).
# No COS / self-hosted runner required.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # macOS pipeline: build → publish to GitHub Release
  # ──────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Detect if this is a pre-release tag (beta/alpha/rc) ──────
      # Pre-release builds only target arm64 to cut electron-builder time in half.
      - name: Detect build arch
        id: arch
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      # ── Extract electron version for stable cache key ─────────────
      - name: Get electron version
        id: electron-ver
        run: echo "version=$(node -p "require('./package.json').devDependencies.electron.replace(/[^\\d.]/g,'')")" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # ── pnpm packages (node_modules) ─────────────────────────────
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      # ── Electron binaries — keyed to electron version, not pnpm-lock ──
      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ steps.electron-ver.outputs.version }}
          restore-keys: ${{ runner.os }}-electron-

      # ── Vite dist output ─────────────────────────────────────────
      - name: Cache Vite build output
        id: cache-vite
        uses: actions/cache@v4
        with:
          path: |
            dist
            dist-electron
          key: ${{ runner.os }}-vite-${{ hashFiles('src/**', 'electron/**', 'shared/**', 'vite.config.*', 'tsconfig*.json', 'pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-vite-

      # ── uv binaries — keyed to version in download script ────────
      - name: Cache uv binaries
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: resources/bin
          key: ${{ runner.os }}-uv-mac-${{ hashFiles('scripts/download-bundled-uv.mjs') }}

      # ── Install deps ─────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Download uv only on cache miss ───────────────────────────
      - name: Download uv binaries
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: pnpm run uv:download:mac

      # ── Build ─────────────────────────────────────────────────────
      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_PARALLELISM: 4
          SKIP_VITE_BUILD: ${{ steps.cache-vite.outputs.cache-hit == 'true' && 'true' || 'false' }}
        run: |
          ulimit -n 65536
          pnpm run package:prep:ci

          if [[ "${{ steps.arch.outputs.prerelease }}" == "true" ]]; then
            # Pre-release: arm64 only — write temp config file (--config requires a path, not inline JSON)
            cat > /tmp/eb-arm64-only.json << 'EBCFG'
            {"mac":{"target":[{"target":"dmg","arch":["arm64"]},{"target":"zip","arch":["arm64"]}]}}
EBCFG
            pnpm exec electron-builder --mac --config /tmp/eb-arm64-only.json --publish never
          else
            # Stable release: both arches as defined in electron-builder.yml
            pnpm exec electron-builder --mac --publish never
          fi

      - name: Remove builder-debug.yml
        run: find release/ -name "builder-debug.yml" -delete || true

      # ── Publish to GitHub Release ─────────────────────────────────
      # electron-updater with provider:github reads beta-mac.yml / latest-mac.yml
      # directly from these release assets — no CDN needed.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
          draft: false
          prerelease: ${{ steps.arch.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.arch.outputs.prerelease == 'false' }}
          generate_release_notes: true
          body: |
            ## 🚀 极智 ${{ github.ref_name }}

            极智 - AI 智能助手

            ### 📦 下载

            #### macOS
            - **Apple Silicon (M1/M2/M3/M4)**: `jizhi-*-mac-arm64.dmg`
            ${{ steps.arch.outputs.prerelease == 'false' && '- **Intel (x64)**: `jizhi-*-mac-x64.dmg`' || '_（此预发版仅提供 Apple Silicon 版本）_' }}

            ### 📝 更新说明

            详见下方自动生成的更新日志。

            ### ⚠️ 安装注意事项

            - **macOS**：首次启动可能提示"来自未知开发者"，请前往系统设置 → 隐私与安全性，点击"仍要打开"；若提示"已损坏"，请在终端执行 `xattr -cr /Applications/极智.app` 后重新打开

            ---

            💬 遇到问题？请提交 [Issue](https://github.com/${{ github.repository }}/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
